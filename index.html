<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Autoplay Fix</title>
    <style>
        body { margin: 0; }
        .background-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .container { position: relative; z-index: 1; }
        .play-button { display: none; }
    </style>
</head>
<body>
    <video class="background-video" autoplay loop muted>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="container">
        <h1>Welcome to Our Presentation</h1>
        <div>
            <p>Here is the content of our presentation:</p>
            <ul>
                <li>Slide 1: Introduction</li>
                <li>Slide 2: Overview</li>
                <li>Slide 3: Features</li>
                <li>Slide 4: Demonstration</li>
                <li>Slide 5: Testimonials</li>
                <li>Slide 6: Summary</li>
                <li>Slide 7: Call to Action</li>
                <li>Slide 8: Thank You</li>
            </ul>
            <button class="play-button" onclick="playAudio()">Play</button>
        </div>
    </div>
    <audio id="bg-music" src="musik.mp3" preload="auto"></audio>
    <audio id="voice-over" src="voice.mp3" preload="auto"></audio>
    <script>
        function playAudio() {
            const bgMusic = document.getElementById('bg-music');
            bgMusic.play();
        }
        // Check for mobile device and show play button
        if (/Mobi|Android/i.test(navigator.userAgent)) {
            document.querySelector('.play-button').style.display = 'block';
        } else {
            const bgMusic = document.getElementById('bg-music');
            bgMusic.play();
        }
    </script>
</body>
</html>
