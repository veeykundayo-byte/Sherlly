<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Presentation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .slide { display: none; }
        .active { display: block; }
        #countdown { font-size: 2em; color: red; }
    </style>
</head>
<body>
    <div id="presentation">
        <div class="slide active"><h1>Slide 1</h1></div>
        <div class="slide"><h1>Slide 2</h1></div>
        <div class="slide"><h1>Slide 3</h1></div>
        <div class="slide"><h1>Slide 4</h1></div>
        <div class="slide"><h1>Slide 5</h1></div>
        <div class="slide"><h1>Slide 6</h1></div>
        <div class="slide"><h1>Slide 7</h1></div>
        <div class="slide"><h1>Slide 8</h1></div>
        <button id="playButton">Play</button>
        <div id="countdown"></div>
    </div>
    <audio autoplay id="backgroundMusic">
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const playButton = document.getElementById('playButton');
        const countdownDisplay = document.getElementById('countdown');
        const totalSlides = slides.length;

        playButton.onclick = function() {
            showSlide(currentSlide);
            startCountdown(10); // 10 seconds countdown
        };

        function showSlide(slideIndex) {
            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === slideIndex);
            });

            if (slideIndex < totalSlides - 1) {
                currentSlide++;
            } else {
                currentSlide = 0; // Reset to first slide
            }
        }

        function startCountdown(seconds) {
            let timeLeft = seconds;
            countdownDisplay.innerText = timeLeft;
            const countdownInterval = setInterval(() => {
                timeLeft--;
                countdownDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    countdownDisplay.innerText = 'Time is up!';
                }
            }, 1000);
        }

        setInterval(() => { showSlide(currentSlide); }, 5000); // Auto slide every 5 seconds
    </script>
</body>
</html>
